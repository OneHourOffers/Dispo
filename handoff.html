<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Assignment Intake</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --coral:#f38a81; --coral-dark:#e0726a; --coral-dim:#fdecea;
    --navy:#0E3E54; --navy2:#1e4164;
    --bg:#f5f3ef; --surface:#ffffff; --border:#ece8e1; --border2:#e2ddd4;
    --text:#19303a; --text-sec:#52606b; --text-muted:#8a949c;
    --radius:14px; --radius-sm:9px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; background:var(--bg); color:var(--text);
    font-family:"DM Sans",system-ui,sans-serif;
    -webkit-font-smoothing:antialiased; padding:28px 16px 60px;
  }
  .wrap{max-width:640px; margin:0 auto;}
  .card{
    background:var(--surface); border:1px solid var(--border);
    border-radius:var(--radius); overflow:hidden;
    box-shadow:0 1px 2px rgba(20,40,55,.04), 0 8px 30px rgba(20,40,55,.06);
  }
  .head{padding:26px 26px 22px; border-bottom:1px solid var(--border); position:relative;}
  .head::before{content:""; position:absolute; left:0; top:0; bottom:0; width:5px; background:var(--coral);}
  .eyebrow{
    font-size:11px; font-weight:700; letter-spacing:.14em; text-transform:uppercase;
    color:var(--coral-dark); margin-bottom:10px;
  }
  h1{
    font-family:"Archivo",sans-serif; font-weight:800; color:var(--navy);
    font-size:clamp(22px,4.4vw,30px); line-height:1.12; margin:0 0 10px;
    letter-spacing:-.01em;
  }
  .sub{font-size:13px; color:var(--text-muted); margin-bottom:18px;}
  .copy-all{
    display:inline-flex; align-items:center; gap:8px; cursor:pointer;
    background:var(--navy); color:#fff; border:none;
    font-family:inherit; font-size:13.5px; font-weight:600;
    padding:11px 18px; border-radius:10px; transition:background .15s, transform .08s;
  }
  .copy-all:hover{background:var(--navy2);}
  .copy-all:active{transform:scale(.98);}
  .copy-all.done{background:var(--coral); }
  .copy-all svg{width:15px; height:15px;}
  .rows{padding:6px 0;}
  .row{
    display:flex; align-items:flex-start; gap:14px;
    padding:16px 26px; border-bottom:1px solid var(--border);
  }
  .row:last-child{border-bottom:none;}
  .row-main{flex:1; min-width:0;}
  .row-label{
    font-size:11px; font-weight:700; letter-spacing:.1em; text-transform:uppercase;
    color:var(--text-muted); margin-bottom:5px;
  }
  .row-value{font-size:15px; color:var(--text); word-break:break-word; line-height:1.4;}
  .row-value.empty{color:var(--text-muted);}
  .copy-btn{
    flex-shrink:0; cursor:pointer; background:var(--coral-dim);
    border:1px solid #f6cfca; color:var(--coral-dark);
    font-family:inherit; font-size:12.5px; font-weight:600;
    padding:7px 14px; border-radius:8px; transition:background .15s, color .15s, transform .08s;
  }
  .copy-btn:hover{background:#fbdedb;}
  .copy-btn:active{transform:scale(.95);}
  .copy-btn.done{background:var(--coral); color:#fff; border-color:var(--coral);}
  .copy-group{
    display:block; margin:14px 26px 4px;
    background:var(--coral-dim); color:var(--coral-dark);
    border:1px dashed #f6cfca; border-radius:9px;
    padding:10px 12px; font-family:inherit; font-size:12.5px; font-weight:600;
    cursor:pointer; text-align:center;
    transition:background .15s, color .15s, border-color .15s, transform .08s;
  }
  .copy-group:hover{background:#fbdedb;}
  .copy-group:active{transform:scale(.99);}
  .copy-group.done{background:var(--coral); color:#fff; border-color:var(--coral);}
  .err{padding:48px 26px; text-align:center; color:var(--text-muted); font-size:15px;}
  .err strong{display:block; color:var(--navy); font-family:"Archivo",sans-serif; font-size:18px; margin-bottom:8px;}
  .foot{text-align:center; font-size:12px; color:var(--text-muted); margin-top:18px;}
</style>
</head>
<body>
<div class="wrap">
  <div class="card" id="card"></div>
  <div class="foot">One Hour Offers · Dispo Assignment Intake</div>
</div>

<script>
  const copyIcon = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>';

  function b64urlDecode(s){
    s = String(s).replace(/-/g,'+').replace(/_/g,'/');
    while(s.length % 4) s += '=';
    return decodeURIComponent(escape(atob(s)));
  }
  function esc(s){
    return String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
  }

  function copyText(text, btn, doneLabel){
    const restore = btn.dataset.label || btn.textContent;
    const finish = () => {
      btn.dataset.label = restore;
      btn.innerHTML = doneLabel;
      btn.classList.add('done');
      setTimeout(()=>{ btn.innerHTML = restore; btn.classList.remove('done'); }, 1300);
    };
    if(navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(text).then(finish).catch(()=>fallback(text, finish));
    } else { fallback(text, finish); }
  }
  function fallback(text, cb){
    const ta = document.createElement('textarea');
    ta.value = text; ta.style.position='fixed'; ta.style.left='-9999px';
    document.body.appendChild(ta); ta.select();
    try{ document.execCommand('copy'); }catch(e){}
    document.body.removeChild(ta); cb();
  }

  function render(){
    const card = document.getElementById('card');
    const raw = (location.hash || '').slice(1);
    let data = null;
    try { data = JSON.parse(b64urlDecode(raw)); } catch(e) { data = null; }

    if(!data || !Array.isArray(data.fields)){
      card.innerHTML = '<div class="err"><strong>Nothing to show</strong>Open this from the link in the assignment email — the field data rides in that link.</div>';
      return;
    }

    const fields = data.fields.filter(f => Array.isArray(f) && f.length >= 2);
    const allText = fields.map(f => f[0] + ' - ' + f[1]).join('\n');

    // group-copy: the whole assignee (name + email + LLC + phone), excluding any second signer
    const fieldMap = {};
    fields.forEach(f => { fieldMap[f[0]] = f[1]; });
    const assigneeBlock = () => {
      const order = ['Assignee Name','Assignee Email','Assignee LLC','Phone'];
      const out = [];
      order.forEach(label => {
        const val = fieldMap[label];
        if(val != null && String(val).trim() !== '') out.push(label + ' - ' + String(val).trim());
      });
      return out.join('\n');
    };

    let html = '';
    html += '<div class="head">';
    html +=   '<div class="eyebrow">' + esc(data.t || 'ASSIGNMENT INTAKE') + '</div>';
    html +=   '<h1>' + esc(data.title || 'Assignment') + '</h1>';
    if(data.at) html += '<div class="sub">Submitted ' + esc(data.at) + '</div>';
    html +=   '<button class="copy-all" id="copy-all">' + copyIcon + 'Copy all fields</button>';
    html += '</div>';
    html += '<div class="rows">';
    fields.forEach((f, i) => {
      const val = (f[1] === '' || f[1] == null) ? '—' : f[1];
      const isEmpty = (f[1] === '' || f[1] == null);
      if(f[0] === 'Assignee Name'){
        html += '<button class="copy-group" id="copy-assignee">Copy entire assignee</button>';
      }
      html += '<div class="row">';
      html +=   '<div class="row-main">';
      html +=     '<div class="row-label">' + esc(f[0]) + '</div>';
      html +=     '<div class="row-value' + (isEmpty ? ' empty' : '') + '">' + esc(val) + '</div>';
      html +=   '</div>';
      if(!isEmpty) html += '<button class="copy-btn" data-i="' + i + '">Copy</button>';
      html += '</div>';
    });
    html += '</div>';
    card.innerHTML = html;

    document.getElementById('copy-all').addEventListener('click', e => {
      copyText(allText, e.currentTarget, copyIcon + 'Copied!');
    });
    const grpBtn = document.getElementById('copy-assignee');
    if(grpBtn){
      grpBtn.addEventListener('click', () => copyText(assigneeBlock(), grpBtn, 'Copied!'));
    }
    card.querySelectorAll('.copy-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const f = fields[parseInt(btn.dataset.i,10)];
        copyText(f[1], btn, 'Copied!');
      });
    });
    document.title = (data.title ? data.title + ' · ' : '') + 'Assignment Intake';
  }

  window.addEventListener('hashchange', render);
  render();
</script>
</body>
</html>
